<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Memorize</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <h1>Memorize</h1>
  <p class="subtitle">Pick a text, then pick a practice mode.</p>

  <div id="textList"></div>

  <div class="add-section">
    <button id="addBtn">+ Add text</button>
    <form id="addForm" hidden>
      <input id="newTitle" placeholder="Title (e.g., Sonnet 18)" required>
      <div class="row file-row">
        <label class="file-btn">
          Load from file
          <input type="file" id="fileInput" accept=".md,.markdown,.txt" hidden>
        </label>
        <button type="button" id="cleanBtn" class="secondary">Clean ✨</button>
        <span class="size-info" id="sizeInfo"></span>
      </div>
      <textarea id="newBody" placeholder="Paste your text here, or load a .md / .txt file. Markdown + HTML get stripped on Clean / Load." rows="12" required></textarea>
      <div class="row">
        <button type="submit">Save</button>
        <button type="button" id="cancelAdd" class="secondary">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="data.js"></script>
<script src="reader.js"></script>
<script>
installReaderOptions({
  textEl: document.querySelector('.menu'),
  include: ['font', 'theme', 'size', 'stripMd'],
  anchor: document.querySelector('.menu .subtitle'),
});

const listEl = document.getElementById('textList');
const addBtn = document.getElementById('addBtn');
const form = document.getElementById('addForm');
const titleInput = document.getElementById('newTitle');
const bodyInput = document.getElementById('newBody');
const cancelBtn = document.getElementById('cancelAdd');
const fileInput = document.getElementById('fileInput');
const cleanBtn = document.getElementById('cleanBtn');
const sizeInfo = document.getElementById('sizeInfo');

function updateSizeInfo() {
  const len = bodyInput.value.length;
  const words = (bodyInput.value.match(/\p{L}+/gu) || []).length;
  sizeInfo.textContent = len ? `${words.toLocaleString()} words · ${(len/1024).toFixed(1)} KB` : '';
}

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const raw = await file.text();
    if (!titleInput.value.trim()) {
      titleInput.value = file.name.replace(/\.(md|markdown|txt)$/i, '');
    }
    bodyInput.value = cleanText(raw);
    updateSizeInfo();
  } catch (err) {
    alert('Could not read file: ' + err.message);
  }
});

cleanBtn.addEventListener('click', () => {
  bodyInput.value = cleanText(bodyInput.value);
  updateSizeInfo();
});

bodyInput.addEventListener('input', updateSizeInfo);

const MODE_GROUPS = [
  {
    name: 'Memorize',
    blurb: 'Active recall — practice from least to most demanding.',
    modes: [
      {
        label: 'Spread blanking',
        file: 'spread.html',
        diff: 'easy',
        diffLabel: 'Beginner',
        desc: 'Whole text visible. Hide a % of words. Slider scales difficulty. Best when first learning.'
      },
      {
        label: 'First letters',
        file: 'first-letter.html',
        diff: 'medium',
        diffLabel: 'Medium',
        desc: 'Only first letter of each word shown. Recite the rest. Good middle-ground practice.'
      },
      {
        label: 'Focus mode',
        file: 'focus.html',
        diff: 'hard',
        diffLabel: 'Hard',
        desc: '4 lines, big and centered, all hidden. Free recall — strongest test of memory.'
      },
      {
        label: 'Type it out',
        file: 'typing.html',
        diff: 'expert',
        diffLabel: 'Impossible',
        desc: 'Type every letter from memory. Production effect — best for verification once you know it.'
      },
    ],
  },
  {
    name: 'Fast read',
    blurb: 'Reading aids — use for first exposure or comfortable rereads.',
    modes: [
      {
        label: 'RSVP (speed read)',
        file: 'rsvp.html',
        diff: 'aid',
        diffLabel: 'Reading aid',
        desc: 'Words flash one at a time at a fixed point. Adjustable WPM. Use for fast exposure before memorizing.'
      },
      {
        label: 'Bionic reading',
        file: 'bionic.html',
        diff: 'aid',
        diffLabel: 'Reading aid',
        desc: 'First half of each word bolded — eye anchors faster. Visual aid for quicker reading.'
      },
    ],
  },
];

function render() {
  listEl.innerHTML = '';
  const texts = getAllTexts();
  if (texts.length === 0) {
    listEl.innerHTML = '<p style="color:var(--muted)">No texts yet. Add one below.</p>';
    return;
  }
  texts.forEach(t => {
    const card = document.createElement('div');
    card.className = 'text-card';
    card.innerHTML = `
      <button class="delete" title="Delete">×</button>
      <h3></h3>
      <div class="meta"></div>
      <div class="modes"></div>
    `;
    card.querySelector('h3').textContent = t.title;
    card.querySelector('.meta').textContent =
      `${countLines(t.body)} lines · ${countWords(t.body)} words`;
    const modesContainer = card.querySelector('.modes');
    MODE_GROUPS.forEach(group => {
      const groupEl = document.createElement('div');
      groupEl.className = 'mode-group';
      groupEl.innerHTML = `
        <div class="mode-group-head">
          <h4 class="mode-group-name"></h4>
          <span class="mode-group-blurb"></span>
        </div>
        <div class="mode-group-grid"></div>
      `;
      groupEl.querySelector('.mode-group-name').textContent = group.name;
      groupEl.querySelector('.mode-group-blurb').textContent = group.blurb;
      const grid = groupEl.querySelector('.mode-group-grid');
      group.modes.forEach(m => {
        const a = document.createElement('a');
        a.href = `${m.file}?id=${encodeURIComponent(t.id)}`;
        a.innerHTML = `
          <div class="mode-head">
            <span class="mode-name"></span>
            <span class="mode-diff ${m.diff}"></span>
          </div>
          <div class="mode-desc"></div>
        `;
        a.querySelector('.mode-name').textContent = m.label;
        a.querySelector('.mode-diff').textContent = m.diffLabel;
        a.querySelector('.mode-desc').textContent = m.desc;
        grid.appendChild(a);
      });
      modesContainer.appendChild(groupEl);
    });
    card.querySelector('.delete').addEventListener('click', () => {
      if (confirm(`Delete "${t.title}"?`)) {
        removeText(t.id);
        render();
      }
    });
    listEl.appendChild(card);
  });
}

addBtn.addEventListener('click', () => {
  form.hidden = false;
  addBtn.hidden = true;
  titleInput.focus();
});
cancelBtn.addEventListener('click', () => {
  form.hidden = true;
  addBtn.hidden = false;
  titleInput.value = '';
  bodyInput.value = '';
  fileInput.value = '';
  updateSizeInfo();
});
form.addEventListener('submit', (e) => {
  e.preventDefault();
  const title = titleInput.value.trim();
  const body = bodyInput.value.trim();
  if (!title || !body) return;
  try {
    addText(title, body);
  } catch (err) {
    alert('Could not save: ' + err.message + '\n(Text may be too large for sessionStorage.)');
    return;
  }
  titleInput.value = '';
  bodyInput.value = '';
  fileInput.value = '';
  updateSizeInfo();
  form.hidden = true;
  addBtn.hidden = false;
  render();
});

render();
</script>
</body>
</html>
