<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Spread blanking — Memorize</title>
<link rel="stylesheet" href="style.css">
<style>
  #text { font-size: 1.15rem; line-height: 1.9; max-width: 760px; margin: 0 auto; }
  #text .line { padding: 0; }
</style>
</head>
<body>

<header>
  <a class="home" href="index.html">← Home</a>
  <span class="text-title" id="textTitle"></span>
  <label>Hide: <input type="range" id="pct" min="0" max="100" value="40" step="5"><span id="pctVal">40%</span></label>
  <button id="reshuffle">Reshuffle</button>
  <button id="revealAll" class="secondary">Reveal all</button>
  <button id="hideAll" class="secondary">Hide all</button>
  <span class="pager" id="pager" hidden>
    <button id="prevPage" class="secondary">◄</button>
    <span class="page-info" id="pageInfo"></span>
    <button id="nextPage" class="secondary">►</button>
  </span>
  <span class="stats" id="stats"></span>
</header>

<div id="text"></div>

<script src="samples.js"></script>
<script src="data.js"></script>
<script src="reader.js"></script>
<script>
const activeText = getActiveText();
document.getElementById('textTitle').textContent = activeText.title;
document.title = activeText.title + ' — Spread';
installReaderOptions({
  textEl: document.getElementById('text'),
  include: ['font', 'theme', 'size', 'lh', 'ls', 'ws', 'width', 'stripMd'],
});

const textEl = document.getElementById('text');
const pctEl = document.getElementById('pct');
const pctVal = document.getElementById('pctVal');
const stats = document.getElementById('stats');
const pagerEl = document.getElementById('pager');
const pageInfoEl = document.getElementById('pageInfo');

const { tokens, lineMap } = tokenize(activeText.body);
const bodyLines = activeText.body.split('\n');
const pages = paginate(bodyLines, 800);
let currentPage = 0;
const paginated = pages.length > 1;
pagerEl.hidden = !paginated;

function applyBlanks(pct) {
  const blankSet = pickBlanksPerLine(tokens, lineMap, pct);
  tokens.forEach((t, i) => {
    if (t.type === 'token' && t.isWord) {
      t.blanked = blankSet.has(i);
      t.revealed = false;
    }
  });
}

function render() {
  textEl.innerHTML = '';
  let lineMapIdx = 0;
  const page = pages[currentPage];

  for (let i = 0; i < bodyLines.length; i++) {
    const raw = bodyLines[i];
    const inPage = i >= page.start && i <= page.end;
    if (raw.trim() === '') {
      if (inPage) {
        const sp = document.createElement('div');
        sp.className = 'stanza-break';
        textEl.appendChild(sp);
      }
      continue;
    }
    const lineIdxs = lineMap[lineMapIdx++];
    if (!inPage) continue;

    const lineDiv = document.createElement('div');
    lineDiv.className = 'line';
    lineIdxs.forEach(idx => {
      const t = tokens[idx];
      if (t.type === 'space') {
        lineDiv.appendChild(document.createTextNode(t.text));
      } else if (t.type === 'token') {
        if (t.blanked) {
          const span = document.createElement('span');
          span.className = 'blank' + (t.revealed ? ' revealed' : '');
          span.textContent = t.text;
          span.addEventListener('click', () => {
            tokens[idx].revealed = !tokens[idx].revealed;
            render();
          });
          lineDiv.appendChild(span);
        } else {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = t.text;
          lineDiv.appendChild(span);
        }
      }
    });
    textEl.appendChild(lineDiv);
  }

  // Stats reflect totals across the full text, not just the page.
  let blankCount = 0, revealedCount = 0;
  tokens.forEach(t => {
    if (t.blanked) { blankCount++; if (t.revealed) revealedCount++; }
  });
  stats.textContent = `${revealedCount}/${blankCount} revealed`;

  if (paginated) {
    pageInfoEl.textContent = `Page ${currentPage + 1} / ${pages.length}`;
  }
  window.scrollTo(0, 0);
}

function update() {
  const pct = +pctEl.value;
  pctVal.textContent = pct + '%';
  applyBlanks(pct);
  render();
}

pctEl.addEventListener('input', () => { pctVal.textContent = pctEl.value + '%'; });
pctEl.addEventListener('change', update);
document.getElementById('reshuffle').addEventListener('click', update);
document.getElementById('revealAll').addEventListener('click', () => {
  tokens.forEach(t => { if (t.blanked) t.revealed = true; });
  render();
});
document.getElementById('hideAll').addEventListener('click', () => {
  tokens.forEach(t => { if (t.blanked) t.revealed = false; });
  render();
});

document.getElementById('prevPage').addEventListener('click', () => {
  if (currentPage > 0) { currentPage--; render(); }
});
document.getElementById('nextPage').addEventListener('click', () => {
  if (currentPage < pages.length - 1) { currentPage++; render(); }
});
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || !paginated) return;
  if (e.key === 'ArrowLeft' && currentPage > 0) { currentPage--; render(); }
  else if (e.key === 'ArrowRight' && currentPage < pages.length - 1) { currentPage++; render(); }
});

update();
</script>
</body>
</html>
